services:
  # ============================================================
  # 本地开发：独立容器，端口 5434/6381，与 travel-car(5432/6379) / only-love(5433/6380) 隔离
  # 生产部署：docker compose up 启动独立 monoforge-postgres + monoforge-redis + app
  #   - ngrok 直接代理 app 的 9000 端口
  # ============================================================

  postgres:
    image: postgres:16-alpine
    container_name: monoforge-postgres
    restart: unless-stopped
    ports:
      - '5434:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-monoforge_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monoforge_password}
      POSTGRES_DB: ${POSTGRES_DB:-monoforge_database}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-monoforge_user} -d ${POSTGRES_DB:-monoforge_database}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: monoforge-redis
    restart: unless-stopped
    ports:
      - '6381:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # 单容器：前后端同端口 9000，ngrok 直接代理此端口即可
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${BUILD_HTTP_PROXY:-}
        HTTPS_PROXY: ${BUILD_HTTP_PROXY:-}
        http_proxy: ${BUILD_HTTP_PROXY:-}
        https_proxy: ${BUILD_HTTP_PROXY:-}
    container_name: monoforge-app
    restart: unless-stopped
    ports:
      - '9000:9000'
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-monoforge_user}:${POSTGRES_PASSWORD:-monoforge_password}@postgres:5432/${POSTGRES_DB:-monoforge_database}
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required, set it in .env (min 32 chars)}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required, set it in .env (min 32 chars)}
      - API_PORT=9000
      - ALLOW_ORIGIN=http://localhost:9000
      - COOKIE_SECURE=false
      - MAIL_HOST=${MAIL_HOST:-}
      - MAIL_PORT=${MAIL_PORT:-}
      - MAIL_USER=${MAIL_USER:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - THROTTLE_TTL=${THROTTLE_TTL:-60}
      - THROTTLE_LIMIT=${THROTTLE_LIMIT:-10}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9000/api/v1/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
  redis_data:
  uploads_data:
